<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; frame-ancestors 'none';">
    <title>问卦 · WenGua</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>问卦</h1>
            <p class="subtitle">心存疑问，掷爻问卦</p>
        </header>

        <main id="main-stage">
            <!-- 模式切换 -->
            <div id="mode-tabs">
                <button id="tab-tongqian" class="mode-tab active">铜钱掷爻</button>
                <button id="tab-meihua" class="mode-tab">梅花易数</button>
                <button id="tab-name" class="mode-tab">姓名起卦</button>
            </div>

            <!-- 卦象展示区 -->
            <div id="gua-display">
                <p class="placeholder">🎋 静心凝神，掷爻起卦</p>
            </div>

            <!-- 铜钱操作区 -->
            <div id="controls">
                <button id="btn-cast" class="btn-primary">掷爻起卦</button>
            </div>

            <!-- 梅花操作区 -->
            <div id="meihua-controls" class="hidden">
                <div class="meihua-input-row">
                    <div class="meihua-input-group">
                        <label for="input-num1">上卦数</label>
                        <input type="number" id="input-num1" min="1" max="9999" placeholder="1-9999">
                    </div>
                    <div class="meihua-input-group">
                        <label for="input-num2">下卦数</label>
                        <input type="number" id="input-num2" min="1" max="9999" placeholder="1-9999">
                    </div>
                    <div class="meihua-input-group">
                        <label for="input-num3">动爻数</label>
                        <input type="number" id="input-num3" min="1" max="9999" placeholder="1-9999">
                    </div>
                </div>
                <div class="meihua-btn-row">
                    <button id="btn-meihua-random" class="btn-aux">🎲 随机数字</button>
                    <button id="btn-meihua-time" class="btn-aux">🕐 用当前时间</button>
                </div>
                <button id="btn-meihua-cast" class="btn-primary">起卦</button>
            </div>

            <!-- 姓名起卦区 -->
            <div id="name-controls" class="hidden">
                <div class="name-input-row">
                    <input type="text" id="input-name" placeholder="请输入姓名（如：诸葛亮）" maxlength="10">
                </div>
                <button id="btn-name-cast" class="btn-primary">起卦</button>
            </div>

            <!-- 结果区 -->
            <div id="result" class="hidden">
                <div id="gua-name"></div>
                <div id="gua-symbol"></div>
                <div id="gua-interpretation"></div>
            </div>
        </main>

        <footer>
            <p>问卦 · 六十四卦小玩具</p>
        </footer>
    </div>

    <script src="js/gua-data.js"></script>
    <script src="js/stroke-data.js"></script>
    <script src="js/animation.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
